<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEKKAN 学習アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#2a2a2a;--accent:#c9a96e;--accent2:#e8c98a;--text:#f0ede8;--text2:#8a8680;--text3:#4a4845;--green:#4caf82;--red:#e05a5a;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
.header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.2em;color:var(--accent);}
.logo span{color:var(--text2);}
.header-right{display:flex;align-items:center;gap:16px;}
.score-bar{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);}
.score-bar strong{color:var(--accent);}
.home-link{font-size:12px;color:var(--text2);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;display:none;}
.home-link:hover{border-color:var(--accent);color:var(--accent);}
.home-link.visible{display:block;}
.home{max-width:720px;margin:0 auto;padding:40px 24px;}
.home-title{font-size:26px;font-weight:700;margin-bottom:6px;}
.home-sub{color:var(--text2);font-size:14px;margin-bottom:36px;}
.test-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:24px;}
.test-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.test-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity .2s;}
.test-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.test-card:hover::before,.test-card.active::before{opacity:1;}
.test-card.active{border-color:var(--accent);background:#1a1710;}
.card-label{font-size:10px;letter-spacing:.15em;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:6px;}
.card-phase1{border-left:3px solid #2ebd8a;}
.card-phase2{border-left:3px solid #4a90d9;}
.card-phase3{border-left:3px solid #d4890a;}
.card-title{font-size:14px;font-weight:500;margin-bottom:5px;}
.card-meta{font-size:11px;color:var(--text2);}
.card-progress{margin-top:10px;height:2px;background:var(--border);border-radius:1px;}
.card-progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .5s;}
.section-head{font-size:11px;letter-spacing:.1em;color:var(--text2);margin-bottom:10px;}
.mode-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.mode-btn{padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
.mode-btn:hover,.mode-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.08);}
.mode-btn:disabled{opacity:.35;cursor:not-allowed;}

.start-btn{width:100%;padding:15px;background:var(--accent);color:#0a0a0a;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;letter-spacing:.05em;}
.start-btn:hover{background:var(--accent2);transform:translateY(-1px);}
.start-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.quiz{max-width:680px;margin:0 auto;padding:32px 24px;display:none;}
.quiz.active{display:block;}
.progress-wrap{margin-bottom:28px;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px;font-family:'DM Mono',monospace;}
.progress-track{height:3px;background:var(--border);border-radius:2px;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.q-category{font-size:10px;letter-spacing:.15em;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:10px;}
.q-type-badge{display:inline-block;padding:2px 8px;border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--text2);margin-bottom:14px;font-family:'DM Mono',monospace;}
.q-text{font-size:17px;font-weight:500;line-height:1.75;margin-bottom:24px;}
.choices{display:flex;flex-direction:column;gap:9px;margin-bottom:20px;}
.choice{padding:13px 17px;border:1px solid var(--border);border-radius:10px;background:var(--surface);cursor:pointer;transition:all .15s;font-size:14px;line-height:1.5;text-align:left;color:var(--text);font-family:'Noto Sans JP',sans-serif;}
.choice:hover:not(:disabled){border-color:var(--accent);background:rgba(201,169,110,.06);}
.choice.correct{border-color:var(--green);background:rgba(76,175,130,.1);color:var(--green);}
.choice.wrong{border-color:var(--red);background:rgba(224,90,90,.1);color:var(--red);}
.choice.reveal{border-color:var(--green);background:rgba(76,175,130,.06);}
.choice:disabled{cursor:default;}
.input-wrap{margin-bottom:20px;}
.input-hint{font-size:11px;color:var(--text2);margin-bottom:8px;padding:6px 10px;background:rgba(201,169,110,.06);border-radius:6px;border-left:2px solid var(--accent);}
.answer-input{width:100%;padding:13px 17px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s;resize:vertical;min-height:56px;}
.answer-input:focus{border-color:var(--accent);}
.answer-input.correct{border-color:var(--green);}
.answer-input.wrong{border-color:var(--red);}
.submit-btn{margin-top:10px;padding:11px 24px;background:var(--accent);color:#0a0a0a;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
.submit-btn:hover{background:var(--accent2);}
.feedback{padding:14px;border-radius:10px;margin-bottom:18px;display:none;}
.feedback.show{display:block;}
.feedback.correct{background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.3);}
.feedback.wrong{background:rgba(224,90,90,.08);border:1px solid rgba(224,90,90,.25);}
.feedback-label{font-size:11px;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:6px;}
.feedback.correct .feedback-label{color:var(--green);}
.feedback.wrong .feedback-label{color:var(--red);}
.feedback-answer{font-size:13px;line-height:1.7;}
.next-btn{width:100%;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;display:none;}
.next-btn.show{display:block;}
.next-btn:hover{border-color:var(--accent);color:var(--accent);}
.result{max-width:560px;margin:0 auto;padding:48px 24px;display:none;text-align:center;}
.result.active{display:block;}
.result-icon{font-size:44px;margin-bottom:18px;}
.result-score{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;color:var(--accent);margin-bottom:6px;}
.result-total{font-size:13px;color:var(--text2);margin-bottom:28px;}
.result-message{font-size:17px;font-weight:500;margin-bottom:36px;}
.result-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:left;margin-bottom:24px;}
.breakdown-title{font-size:10px;letter-spacing:.1em;color:var(--text2);margin-bottom:14px;font-family:'DM Mono',monospace;}
.breakdown-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.breakdown-row:last-child{border-bottom:none;}
.breakdown-name{color:var(--text2);}
.breakdown-val{font-family:'DM Mono',monospace;}
.breakdown-val.ok{color:var(--green);}
.breakdown-val.ng{color:var(--red);}
.wrong-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:left;margin-bottom:20px;max-height:260px;overflow-y:auto;}
.wrong-item{padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;}
.wrong-item:last-child{border-bottom:none;}
.wrong-item-q{color:var(--text2);margin-bottom:3px;}
.wrong-item-a{color:var(--accent);}
.result-btns{display:flex;gap:10px;}
.result-btn{flex:1;padding:13px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
.result-btn.primary{background:var(--accent);color:#0a0a0a;border:none;}
.result-btn.primary:hover{background:var(--accent2);}
.result-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text2);}
.result-btn.secondary:hover{border-color:var(--accent);color:var(--accent);}
@media(max-width:480px){.test-grid{grid-template-columns:1fr;}.result-btns{flex-direction:column;}.q-text{font-size:15px;}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">BEKKAN<span> / 学習アプリ</span></div>
  <div class="header-right">
    <div class="score-bar" id="globalScore"></div>
    <button class="home-link" id="homeLink" onclick="confirmGoHome()">← ホームへ</button>
  </div>
</div>

<div class="home" id="homeView">
  <div class="home-title">テスト学習</div>
  <div class="home-sub">テストを選んで繰り返し学習しましょう。各テストは毎回ランダムで出題され、全問網羅を目指します。</div>
  <div class="test-grid" id="testGrid"></div>
  <div class="section-head">LEARNING MODE</div>
  <div class="mode-btns">
    <button class="mode-btn active" data-mode="all">全問出題（ランダム順）</button>
    <button class="mode-btn" data-mode="random">ランダム15問</button>
    <button class="mode-btn" data-mode="weak">苦手問題のみ</button>
  </div>

  <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>学習を開始する</button>
</div>

<div class="quiz" id="quizView">
  <div class="progress-wrap">
    <div class="progress-info"><span id="progressText">1 / 10</span><span id="scoreText">正解 0</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="q-category" id="qCategory"></div>
  <div class="q-type-badge" id="qTypeBadge"></div>
  <div class="q-text" id="qText"></div>
  <div class="choices" id="choicesWrap"></div>
  <div class="input-wrap" id="inputWrap" style="display:none">
    <div class="input-hint">キーワードが含まれていれば正解と判定します（Enterで送信）</div>
    <textarea class="answer-input" id="answerInput" placeholder="答えを入力してください" rows="2" onkeydown="handleEnter(event)"></textarea>
    <button class="submit-btn" onclick="submitFree()">回答する</button>
  </div>
  <div class="feedback" id="feedback">
    <div class="feedback-label" id="feedbackLabel"></div>
    <div class="feedback-answer" id="feedbackAnswer"></div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">次の問題へ →</button>
</div>

<div class="result" id="resultView">
  <div class="result-icon" id="resultIcon"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-total" id="resultTotal"></div>
  <div class="result-message" id="resultMessage"></div>
  <div class="wrong-list" id="wrongList" style="display:none">
    <div class="breakdown-title">間違えた問題</div>
    <div id="wrongItems"></div>
  </div>
  <div class="result-breakdown" id="resultBreakdown"></div>
  <div class="result-btns">
    <button class="result-btn primary" onclick="retryWeak()" id="retryWeakBtn">苦手問題を復習</button>
    <button class="result-btn secondary" onclick="goHome()">ホームへ戻る</button>
  </div>
</div>

<script>
const TESTS={
  runner:{id:'runner',label:'PHASE 1',title:'ランナー業務テスト',randomPick:15,
    questions:[
      {sec:'グラスの洗い方',type:'○×',q:'グラスはまず二又スポンジでグラスの口が付く部分をよく洗ってから洗浄機にかける。',choices:['○','×'],answer:'○',keys:[],pt:1,note:'グロスを取るために口部分を先に洗うことが重要'},
      {sec:'グラスの洗い方',type:'4択',q:'ショットグラスを洗浄機にかけてはいけない理由はどれか？',choices:['割れやすいから','グラスが熱くなりすぐ使えないから','洗浄機が汚れるから','油が溜まるから'],answer:'グラスが熱くなりすぐ使えないから',keys:[],pt:1,note:'ショットグラスは洗剤のみで水洗い'},
      {sec:'グラスの洗い方',type:'4択',q:'グラスを拭く際に使うタオルはどれか？',choices:['緑刺繍の食器拭き','赤・黄刺繍のグラスタオル','灰皿用ダスター','普通のタオル'],answer:'赤・黄刺繍のグラスタオル',keys:[],pt:1,note:'グラスタオルと食器拭きは別物'},
      {sec:'グラスの洗い方',type:'○×',q:'グラスをトレンチで運ぶ際、できるだけ多く乗せてまとめて運ぶのが効率的である。',choices:['○','×'],answer:'×',keys:[],pt:1,note:'無理に乗せずスペースを空けて運ぶ。クラッシュ防止のため'},
      {sec:'グラスの洗い方',type:'穴埋',q:'グラス拭き後、汚れ（特に＿＿＿）が残っていないか必ず確認すること。',choices:[],answer:'グロス',keys:['グロス','グロ'],pt:1,note:'口紅などのグロスが残りやすい'},
      {sec:'グラス早回し',type:'4択',q:'早回し指示を受けた際、最優先で洗うグラスの組み合わせとして正しいものはどれか？',choices:['ワイングラス・シャンパングラス・コリンズ','10タン・チェイサー・ロック・焼酎・コリンズ・ショット','コリンズ・ショット・ワイングラス','10タン・ショット・シャンパングラス'],answer:'10タン・チェイサー・ロック・焼酎・コリンズ・ショット',keys:[],pt:1,note:'脚付きグラスは早回し対象外'},
      {sec:'グラス早回し',type:'○×',q:'早回し中、脚付きグラス（ワイン・シャンパン）は外側だけ拭いてBarに返してよい。',choices:['○','×'],answer:'×',keys:[],pt:1,note:'脚付きグラスは中まで拭かないと使えない'},
      {sec:'グラス早回し',type:'穴埋',q:'早回し指示を受けた際、洗い場に優先グラスがなければ＿＿＿を回り優先グラスだけ選んで洗い場に持って行く。',choices:[],answer:'下げ物が置いてある箇所',keys:['下げ物','下げ'],pt:1,note:'ホール全体の下げ物置き場を確認する'},
      {sec:'食器・シルバーの洗い方',type:'○×',q:'食器は基本的に洗浄機にかけてよい。',choices:['○','×'],answer:'×',keys:[],pt:1,note:'油が洗浄機に溜まるため、食器は手洗いが基本'},
      {sec:'食器・シルバーの洗い方',type:'4択',q:'食器を拭く際に使うタオルはどれか？',choices:['赤・黄刺繍のグラスタオル','緑刺繍の食器拭き','灰皿用ダスター','白タオル'],answer:'緑刺繍の食器拭き',keys:[],pt:1,note:'色別でタオルを使い分ける'},
      {sec:'食器・シルバーの洗い方',type:'4択',q:'洗浄済み食器をキッチンへ持って行くタイミングとして正しいものはどれか？',choices:['すぐに持って行く','フードを取りに行く際・トイレチェックに行く際','営業終了後まとめて','Barに返す際'],answer:'フードを取りに行く際・トイレチェックに行く際',keys:[],pt:1,note:'移動のついでに持って行くことで効率化'},
      {sec:'食器・シルバーの洗い方',type:'4択',q:'洗浄後にBarに返すシルバーの組み合わせとして正しいものはどれか？',choices:['大スプーン・大フォーク・ナイフ','姫フォーク・姫スプーン・アイストング・マドラー・フルーツトング','大フォーク・姫フォーク・ナイフ','マドラー・大スプーン・バターナイフ'],answer:'姫フォーク・姫スプーン・アイストング・マドラー・フルーツトング',keys:[],pt:1,note:'大スプーン・大フォーク・ナイフは洗浄済シルバー入れへ'},
      {sec:'食器・シルバーの洗い方',type:'穴埋',q:'ホールの食器として洗い場に置いておく食器を2種類答えよ。',choices:[],answer:'取り皿・小アミューズ皿',keys:['取り皿','アミューズ'],pt:1,note:'この2つはキッチンに持って行かない'},
      {sec:'灰皿の洗い方・補充',type:'○×',q:'灰皿を洗う際、洗剤を使って洗うのが正しい。',choices:['○','×'],answer:'×',keys:[],pt:1,note:'灰皿は水洗いのみ。洗剤は使わない'},
      {sec:'灰皿の洗い方・補充',type:'4択',q:'灰皿を拭く際に使うのはどれか？',choices:['グラスタオル（赤・黄）','食器拭き（緑）','灰皿用ダスター','普通のタオル'],answer:'灰皿用ダスター',keys:[],pt:1,note:'灰皿専用のダスターを使う'},
      {sec:'灰皿の洗い方・補充',type:'穴埋',q:'灰皿が洗い場に何枚溜まったら定数補充しに行くか？',choices:[],answer:'10枚',keys:['10'],pt:1,note:'10枚溜まったら補充のタイミング'},
      {sec:'灰皿の洗い方・補充',type:'4択',q:'B1のF9側ステーションへの灰皿補充定数として正しいものはどれか？',choices:['上に3枚×2、中に3枚','上に5枚×2、中に5枚','上に10枚、中に5枚','上に5枚のみ'],answer:'上に5枚×2、中に5枚',keys:[],pt:1,note:'各ステーションの定数を覚える'},
      {sec:'おしぼりの仕分け',type:'4択',q:'当店で使い分けている2種類のおしぼりはどれか？',choices:['新しぼと古しぼ','新しぼと旧しぼ','白しぼと黒しぼ','大しぼと小しぼ'],answer:'新しぼと旧しぼ',keys:[],pt:1,note:'回収場所がそれぞれ異なる'},
      {sec:'おしぼりの仕分け',type:'○×',q:'新しぼと旧しぼは同じ回収箱に入れてよい。',choices:['○','×'],answer:'×',keys:[],pt:1,note:'それぞれ異なる回収箱に仕分ける'},
      {sec:'その他備品処理',type:'4択',q:'ビン類・缶類を洗い場に持ってきた場合の正しい対応はどれか？',choices:['そのまま洗い場で処理する','ウェイターに渡すかグラスをBarに戻す際に一緒に渡す','ゴミ箱に捨てる','センターに渡す'],answer:'ウェイターに渡すかグラスをBarに戻す際に一緒に渡す',keys:[],pt:1,note:'ビン・缶のゴミ箱はBarにある'},
      {sec:'その他備品処理',type:'○×',q:'空になったガス缶は屋内でガス抜きしてからガス缶入れに入れてよい。',choices:['○','×'],answer:'×',keys:[],pt:1,note:'ガス抜きは社員が営業後に行う。屋内での勝手なガス抜きは絶対禁止'},
      {sec:'その他備品処理',type:'穴埋',q:'断線したコードや点かなくなった電球は何入れに入れるか？',choices:[],answer:'廃棄電化製品入れ',keys:['廃棄','電化'],pt:1,note:'廃棄電化製品入れに正しく分別する'},
      {sec:'クラッシュ対応',type:'4択',q:'クラッシュが発生した際、その場にいるスタッフ全員がまず行うべきことはどれか？',choices:['すぐ片付ける','お客様に向けて「失礼しました！」と謝罪する','センターを呼ぶ','何もしない'],answer:'お客様に向けて「失礼しました！」と謝罪する',keys:[],pt:1,note:'近い・遠いに関わらず全員が謝罪する'},
      {sec:'クラッシュ対応',type:'○×',q:'インカムでクラッシュを報告する際は「クラッシュです」とだけ伝えればよい。',choices:['○','×'],answer:'×',keys:[],pt:1,note:'「〜（具体的な場所）でクラッシュです」と場所を必ず伝える'},

      {sec:'スイート・パーティ対応',type:'穴埋',q:'スイートで部屋付きシャンパンを提供する際の文言の空欄を答えよ：「こちらのお部屋にシャンパンが一本＿＿でございますが…」',choices:[],answer:'サービスで付いております',keys:['サービス','付いております'],pt:1,note:'定型フレーズを正確に'},
      {sec:'スイート・パーティ対応',type:'○×',q:'パーティスイートでは原則ウェイターを2名配置してオペレーションを行う。',choices:['○','×'],answer:'○',keys:[],pt:1,note:'大人数対応のため2名体制'},
      {sec:'スイート・パーティ対応',type:'4択',q:'8名以上のスイート予約でのサービスシャンパンとして提供するものはどれか？',choices:['ドゥッツ通常ボトル','ドゥッツマグナム','クリスタル','ドンペリ'],answer:'ドゥッツマグナム',keys:[],pt:1,note:'8名以上はマグナムに変わる'},
      {sec:'ボトル・フード・禁止事項',type:'4択',q:'個室でボトルオーダーを受けた際インカムで伝えるべき情報はどれか？',choices:['値段・銘柄・人数','卓番・銘柄・何本目か','銘柄・本数・割り方','人数・銘柄・時刻'],answer:'卓番・銘柄・何本目か',keys:[],pt:1,note:'ラウンジと同じ3点'},
      {sec:'ボトル・フード・禁止事項',type:'穴埋',q:'フードが頼まれた際、伝票の一行目には何と書くか？',choices:[],answer:'フード',keys:['フード'],pt:1,note:'フード伝票の書き方'},
      {sec:'ボトル・フード・禁止事項',type:'○×',q:'お客様同士のみの写真撮影は問題ないが、女性とのツーショットや動画撮影は禁止でセンターへ報告が必要。',choices:['○','×'],answer:'○',keys:[],pt:1,note:'プライバシー・ルール遵守'},
      {sec:'ボトル・フード・禁止事項',type:'4択',q:'卓内で女性への過度な接触が見られた場合の正しい対応はどれか？',choices:['ウェイターが直接注意する','そのまま様子を見る','即座にセンターへ報告する','エスコートに任せる'],answer:'即座にセンターへ報告する',keys:[],pt:1,note:'センター・マネージャーが対応'},
      {sec:'退店・その他対応',type:'穴埋',q:'タクシーを依頼された際のインカム報告の形式を答えよ。',choices:[],answer:'〇〇卓、〇〇卓様がタクシーを〇台止めてほしいそうです',keys:['卓','タクシー','台'],pt:1,note:'卓番と台数を必ず伝える'},
      {sec:'退店・その他対応',type:'4択',q:'運転代行サービスを依頼された際、お客様に確認すべき5点はどれか？',choices:['名前・車の場所・行き先・車種・時間','名前・人数・行き先・車種・時間','名前・連絡先・車の場所・行き先・時間','名前・車の場所・行き先・連絡先・時間'],answer:'名前・車の場所・行き先・車種・時間',keys:[],pt:1,note:'5点すべて必要'},
      {sec:'退店・その他対応',type:'○×',q:'ゲストアウト後は即座に忘れ物チェックを行い、テーブル上・下、ソファの隙間・横を確認する。',choices:['○','×'],answer:'○',keys:[],pt:1,note:'4箇所の確認が基本'},
      {sec:'退店・その他対応',type:'穴埋',q:'個室でフルーツ盛りを頼まれた際、卓に準備するものを答えよ。',choices:[],answer:'姫フォーク入れに姫フォーク（人数+2本）・フルーツトング×1',keys:['姫フォーク','フルーツトング'],pt:2,note:'備品準備の正確な把握'},
    ]}
};

let S={selectedTest:null,mode:'all',selectedCat:null,questions:[],current:0,score:0,sessionWrong:[],answered:false,
  history:JSON.parse(localStorage.getItem('bk_h3')||'{}'),
  weakSet:JSON.parse(localStorage.getItem('bk_w3')||'{}')};
function save(){localStorage.setItem('bk_h3',JSON.stringify(S.history));localStorage.setItem('bk_w3',JSON.stringify(S.weakSet));}

function init(){
  document.getElementById('homeLink').classList.remove('visible');
  const grid=document.getElementById('testGrid');grid.innerHTML='';
  Object.values(TESTS).forEach(t=>{
    const h=S.history[t.id]||{correct:0,total:0};
    const pct=h.total>0?Math.round(h.correct/h.total*100):0;
    const wk=Object.keys(S.weakSet).filter(k=>k.startsWith(t.id+'_')).length;
    const d=document.createElement('div');d.className='test-card';d.dataset.id=t.id;
    const qCount = t.randomPick ? `${t.questions.length}問（毎回${t.randomPick}問ランダム出題）` : `${t.questions.length}問`;
    d.innerHTML=`<div class="card-label">${t.label}</div><div class="card-title">${t.title}</div>
      <div class="card-meta">${qCount}${h.total>0?` / 正解率 ${pct}%`:''}${wk>0?` / 苦手 ${wk}問`:''}</div>
      <div class="card-progress"><div class="card-progress-fill" style="width:${pct}%"></div></div>`;
    d.onclick=()=>selectTest(t.id);grid.appendChild(d);
  });
  updateGlobal();
}

function updateGlobal(){
  let t=0,c=0;Object.values(S.history).forEach(h=>{t+=h.total;c+=h.correct;});
  document.getElementById('globalScore').innerHTML=t>0?`累計 <strong>${Math.round(c/t*100)}%</strong> 正解`:'';
}

function selectTest(id){
  S.selectedTest=id;S.selectedCat=null;
  document.querySelectorAll('.test-card').forEach(c=>c.classList.toggle('active',c.dataset.id===id));
  document.getElementById('startBtn').disabled=false;
  renderCatWrap();checkWeak();
}


function checkWeak(){
  const btn=document.querySelector('[data-mode="weak"]');if(!S.selectedTest)return;
  const n=Object.keys(S.weakSet).filter(k=>k.startsWith(S.selectedTest+'_')).length;
  btn.textContent=n>0?`苦手問題のみ（${n}問）`:'苦手問題のみ';btn.disabled=n===0;
}

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');S.mode=btn.dataset.mode;
    checkWeak();
  };
});

function startQuiz(){
  const test=TESTS[S.selectedTest];
  let qs=test.questions.map((q,i)=>({...q,id:`${test.id}_${i}`}));
  if(S.mode==='weak'){
    qs=qs.filter(q=>S.weakSet[q.id]);
    if(!qs.length){alert('苦手問題がありません');return;}
  }else if(S.mode==='random'){
    const n=test.randomPick||15;
    qs=qs.sort(()=>Math.random()-.5).slice(0,Math.min(n,qs.length));
  }else{
    qs=qs.sort(()=>Math.random()-.5);
  }
  S.questions=qs;S.current=0;S.score=0;S.sessionWrong=[];S.answered=false;
  document.getElementById('homeView').style.display='none';
  document.getElementById('resultView').classList.remove('active');
  document.getElementById('quizView').classList.add('active');
  document.getElementById('homeLink').classList.add('visible');
  renderQ();
}

function renderQ(){
  const q=S.questions[S.current];const total=S.questions.length;S.answered=false;
  document.getElementById('qCategory').textContent=q.cat;
  document.getElementById('qTypeBadge').textContent=q.type;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('progressText').textContent=`${S.current+1} / ${total}`;
  document.getElementById('scoreText').textContent=`正解 ${S.score}`;
  document.getElementById('progressFill').style.width=`${(S.current/total)*100}%`;
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  const cw=document.getElementById('choicesWrap');const iw=document.getElementById('inputWrap');
  if(q.type==='4択'||q.type==='○×'){
    cw.style.display='flex';iw.style.display='none';cw.innerHTML='';
    (q.type==='○×'?['○','×']:q.choices).forEach(opt=>{
      const b=document.createElement('button');b.className='choice';b.textContent=opt;
      b.onclick=()=>pick(b,opt,q);cw.appendChild(b);
    });
  }else{
    cw.style.display='none';iw.style.display='block';
    const inp=document.getElementById('answerInput');inp.value='';inp.className='answer-input';inp.focus();
  }
}

function pick(btn,sel,q){
  if(S.answered)return;S.answered=true;
  const ok=sel===q.answer;record(q,ok);
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer)b.classList.add(ok?'correct':'reveal');
    else if(b===btn&&!ok)b.classList.add('wrong');
  });
  showFB(ok,q);
}

function submitFree(){
  if(S.answered)return;
  const q=S.questions[S.current];
  const val=document.getElementById('answerInput').value.trim();
  if(!val)return;
  S.answered=true;
  const keys=q.keys||[];
  const inp=val.replace(/[\s　]/g,'').toLowerCase();
  const ok=keys.length>0?keys.some(k=>inp.includes(k.replace(/[\s　]/g,'').toLowerCase())):false;
  document.getElementById('answerInput').className='answer-input '+(ok?'correct':'wrong');
  record(q,ok);showFB(ok,q);
}

function handleEnter(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitFree();}}

function record(q,ok){
  if(!S.history[S.selectedTest])S.history[S.selectedTest]={correct:0,total:0};
  S.history[S.selectedTest].total++;
  if(ok){S.history[S.selectedTest].correct++;S.score++;delete S.weakSet[q.id];}
  else{S.weakSet[q.id]=true;S.sessionWrong.push(q);}
  save();
}

function showFB(ok,q){
  const fb=document.getElementById('feedback');
  fb.className='feedback show '+(ok?'correct':'wrong');
  document.getElementById('feedbackLabel').textContent=ok?'✓ 正解':'✗ 不正解';
  document.getElementById('feedbackAnswer').innerHTML=ok
    ?`<span style="color:var(--text2)">${q.note}</span>`
    :`正答：<strong style="color:var(--accent)">${q.answer}</strong>${q.note?`<br><span style="color:var(--text2)">${q.note}</span>`:''}`;
  document.getElementById('nextBtn').className='next-btn show';
}

function nextQ(){S.current++;if(S.current>=S.questions.length)showResult();else renderQ();}

function showResult(){
  document.getElementById('quizView').classList.remove('active');
  document.getElementById('resultView').classList.add('active');
  const total=S.questions.length;const pct=Math.round(S.score/total*100);const pass=pct>=80;
  document.getElementById('resultIcon').textContent=pct===100?'🏆':pass?'✨':'📚';
  document.getElementById('resultScore').textContent=`${S.score}/${total}`;
  document.getElementById('resultTotal').textContent=`正解率 ${pct}%　合格ライン：80%以上`;
  document.getElementById('resultMessage').textContent=pct===100?'完璧です！':pass?'合格！よく頑張りました。':'苦手問題を復習しましょう。';
  const h=S.history[S.selectedTest]||{correct:0,total:0};
  const cum=h.total>0?Math.round(h.correct/h.total*100):0;
  document.getElementById('resultBreakdown').innerHTML=`
    <div class="breakdown-title">セッション結果</div>
    <div class="breakdown-row"><span class="breakdown-name">正解数</span><span class="breakdown-val ${pass?'ok':'ng'}">${S.score} / ${total}問</span></div>
    <div class="breakdown-row"><span class="breakdown-name">正解率</span><span class="breakdown-val ${pass?'ok':'ng'}">${pct}%</span></div>
    <div class="breakdown-row"><span class="breakdown-name">累計正解率</span><span class="breakdown-val">${cum}%</span></div>
    <div class="breakdown-row"><span class="breakdown-name">苦手問題</span><span class="breakdown-val ${S.sessionWrong.length>0?'ng':'ok'}">${S.sessionWrong.length}問</span></div>`;
  if(S.sessionWrong.length>0){
    document.getElementById('wrongList').style.display='block';
    document.getElementById('wrongItems').innerHTML=S.sessionWrong.map(q=>`
      <div class="wrong-item">
        <div class="wrong-item-q">${q.cat}｜${q.q.substring(0,40)}${q.q.length>40?'…':''}</div>
        <div class="wrong-item-a">正答：${q.answer.substring(0,60)}${q.answer.length>60?'…':''}</div>
      </div>`).join('');
    document.getElementById('retryWeakBtn').style.display='block';
  }else{
    document.getElementById('wrongList').style.display='none';
    document.getElementById('retryWeakBtn').style.display='none';
  }
}

function retryWeak(){S.mode='weak';startQuiz();}

function goHome(){
  document.getElementById('resultView').classList.remove('active');
  document.getElementById('quizView').classList.remove('active');
  document.getElementById('homeView').style.display='block';
  document.getElementById('homeLink').classList.remove('visible');
  init();
}

function confirmGoHome(){
  if(!S.answered&&S.current>0){
    if(!confirm('学習を中断してホームへ戻りますか？\n（現在の回答は記録されません）'))return;
  }
  goHome();
}

init();
</script>
</body>
